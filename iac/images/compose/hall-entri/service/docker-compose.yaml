
include:
  - pgactive.docker-compose.yaml
  - gate.docker-compose.yaml
  - client.docker-compose.yaml
  - http.docker-compose.yaml
  - ui.docker-compose.yaml
services:
  polly-root:
      image: $APPLICATION_HALL_IMAGE
      entrypoint: launcher
      command: |
        pnpm run -C realms/entri/entri-io polly
      environment:
        COMPOSE_PROJECT_NAME: $COMPOSE_PROJECT_NAME
        POLLY_CADDYFILE: /caddy/Caddyfile
        POLLY_CADDYFILE_DOMAIN: entri.hall.platform
        POLLY_CADDYFILE_REPLACE: true
        ENTRI_HTTP_HOST: http:${ENTRI_HTTP}
        ENTRI_UI_HOST: ui:${ENTRI_UI}      
      volumes: &caddyfile_volumes
          - ${HOME}/.cache/levicape/${COMPOSE_PROJECT_NAME}/polly/caddy:/caddy      
  polly-gate:
      image: $APPLICATION_HALL_IMAGE
      depends_on:
        polly-root:
          condition: service_completed_successfully      
      entrypoint: launcher
      command: |
        pnpm run -C realms/gate/gate-io polly
      environment:
        COMPOSE_PROJECT_NAME: $COMPOSE_PROJECT_NAME
        POLLY_CADDYFILE: /caddy/Caddyfile
        POLLY_CADDYFILE_DOMAIN: gate.hall.platform        
        GATE_HTTP_HOST: gate-http:${GATE_HTTP}
        GATE_UI_HOST: gate-ui:${GATE_UI}
      volumes: *caddyfile_volumes
  polly-client:
      image: $APPLICATION_HALL_IMAGE
      depends_on:
        polly-gate:
          condition: service_completed_successfully      
      entrypoint: launcher
      command: |
        node --experimental-strip-types ./realms/gate/client-ui/src/Polly.mts
      environment:
        COMPOSE_PROJECT_NAME: $COMPOSE_PROJECT_NAME 
        POLLY_CADDYFILE: /caddy/Caddyfile
        POLLY_CADDYFILE_DOMAIN: client.hall.platform        
        CLIENT_UI_HOST: client-ui:${CLIENT_UI}
      volumes: *caddyfile_volumes


